  - docs/proposals/stuff-plus-ingestion-2026-05-04-infra-scope-gate-verdict.md (prior chain; retrain trigger conditions binding)
  - supabase/migrations/0030_pitcher_game_log_fb.sql (column already applied)
  - scripts/backfill-db/07-pitcher-game-log.mjs (fb parse to be removed from parsePitcherStats)
  - scripts/lib/xfip-formula.ts (formula module; fb input semantics documented at line 59)

