name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present
        env:
          # Minimal env for unit tests — no live service credentials needed
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          # Stub values for build-time env validation — real secrets live in Vercel
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_STAGING }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_STAGING }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          # Server-only vars must be present at build time only if referenced in generateStaticParams
          # or server components that run at build time. Use placeholder if not accessed at build:
          SUPABASE_SERVICE_ROLE_KEY: "build-placeholder-not-used"
          STRIPE_SECRET_KEY: "build-placeholder-not-used"
          ODDS_API_KEY: "build-placeholder-not-used"
          ANTHROPIC_API_KEY: "build-placeholder-not-used"
          UPSTASH_REDIS_REST_URL: "build-placeholder-not-used"
          UPSTASH_REDIS_REST_TOKEN: "build-placeholder-not-used"
          CRON_SECRET: "build-placeholder-not-used"

# Deploy to Vercel on merge to main is handled by the Vercel GitHub integration
# (automatic, configured in the Vercel dashboard — NOT a manual curl step).
# Required setup in Vercel dashboard:
#   1. Connect GitHub repo to the Vercel project
#   2. Set Root Directory to "apps/web"
#   3. Configure all env vars per docs/infra/secrets-manifest.md
#   4. Enable "Deploy on Push to main"
# Vercel will build and deploy automatically on every merge to main.
