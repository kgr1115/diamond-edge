# Diamond Edge — Fly.io ML/LLM Inference Worker
#
# Status: SKELETON — not yet deployed.
# TASK-005 (ML engineer) will confirm whether Fly.io is required or whether
# inference can run in a Supabase Edge Function (150s limit).
# If Edge Function is sufficient, this file stays uncommitted but is not deployed.
#
# Scale-to-zero: min_machines_running = 0 means machines shut down when idle.
# You pay only for actual compute time. Expected cost: ~$1-3/mo for 1x daily
# pick pipeline run (a few minutes of GPU-free Python inference).
#
# To deploy for the first time:
#   cd worker
#   fly launch --no-deploy   # attaches this toml to the Fly org
#   fly secrets set ...      # see docs/infra/secrets-manifest.md
#   fly deploy
#
# To scale up (if ML engineer needs more RAM for model loading):
#   Update [[vm]] memory_mb from 256 to 512 or 1024, then: fly deploy

app = "diamond-edge-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
  # TASK-005 ML engineer determination: 512 MB required.
  # Python (~150MB) + numpy/shap/lightgbm (~90MB) + 3 model artifacts (~50MB) + headroom = ~320MB.
  # 512MB provides comfortable margin. Do not reduce to 256MB.
  # Cost at scale-to-zero: actual spend ~$1-4/mo; see inference-runtime.md for full math.
